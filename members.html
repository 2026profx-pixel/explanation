<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRO FX MEMBERS</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>

:root{
  --gold:#C9A84C;
  --dark:#080A0F;
  --dark2:#11151d;
  --text:#E8E8E8;
  --muted:#94A3B8;
  --border:rgba(201,168,76,.2);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--dark);
  color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;
}

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;

  background:
    radial-gradient(circle at top left, rgba(201,168,76,.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(201,168,76,.12), transparent 30%),
    linear-gradient(135deg,#05070b 0%, #0d1118 40%, #05070b 100%);
}

/* 背景グリッド */
.login-screen::before{
  content:'';
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(201,168,76,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,.05) 1px, transparent 1px);

  background-size:50px 50px;

  mask-image:radial-gradient(circle at center, black 40%, transparent 90%);
}

/* 光 */
.login-screen::after{
  content:'';
  position:absolute;

  width:600px;
  height:600px;

  background:radial-gradient(circle, rgba(201,168,76,.12), transparent 70%);

  top:-200px;
  right:-200px;

  filter:blur(40px);
}

.login-box{
  width:100%;
  max-width:420px;

  position:relative;
  z-index:10;

  background:rgba(17,21,29,.72);

  backdrop-filter:blur(18px);

  border:1px solid rgba(201,168,76,.2);

  padding:48px 40px;

  border-radius:18px;

  box-shadow:
    0 20px 60px rgba(0,0,0,.5),
    0 0 0 1px rgba(255,255,255,.02) inset;

  overflow:hidden;
}

/* 上ライン */
.login-box::before{
  content:'';

  position:absolute;
  top:0;
  left:0;

  width:100%;
  height:2px;

  background:
    linear-gradient(
      90deg,
      transparent,
      var(--gold),
      transparent
    );
}

.logo{
  font-size:52px;
  font-weight:700;
  color:var(--gold);

  text-align:center;

  margin-bottom:12px;

  letter-spacing:4px;
}

.sub{
  text-align:center;
  color:var(--muted);
  margin-bottom:38px;
  font-size:14px;
  line-height:1.7;
}

input{
  width:100%;
  padding:16px;

  background:rgba(0,0,0,.25);

  border:1px solid rgba(201,168,76,.18);

  color:white;

  margin-bottom:16px;

  font-size:15px;

  border-radius:10px;

  transition:.25s;
}

input:focus{
  outline:none;

  border-color:var(--gold);

  box-shadow:
    0 0 0 4px rgba(201,168,76,.12);
}

button{
  width:100%;
  padding:16px;

  border:none;
  cursor:pointer;

  border-radius:10px;

  background:
    linear-gradient(
      135deg,
      var(--gold),
      #8A6E2F
    );

  color:black;

  font-weight:700;
  font-size:15px;

  transition:.25s;
}

button:hover{
  transform:translateY(-2px);

  box-shadow:
    0 12px 30px rgba(201,168,76,.25);
}

.logo{
  font-size:42px;
  font-weight:700;
  color:var(--gold);
  text-align:center;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:var(--muted);
  margin-bottom:35px;
  font-size:14px;
}

input{
  width:100%;
  padding:14px;
  background:#0b0f15;
  border:1px solid var(--border);
  color:white;
  margin-bottom:16px;
  font-size:15px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,var(--gold),#8A6E2F);
  color:black;
  font-weight:700;
  font-size:15px;
}

.error{
  color:#ff5f7a;
  margin-top:14px;
  text-align:center;
  font-size:14px;
}

.members-area{
  display:none;
  padding:80px 5%;
}

.members-header{
  margin-bottom:50px;
}

.members-title{
  font-size:42px;
  color:var(--gold);
  margin-bottom:10px;
}

.members-sub{
  color:var(--muted);
}


.video-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
}
.video-category{
  width:100%;
}

.category-title{
  font-size:32px;
  color:var(--gold);
  margin-bottom:24px;
}

.category-sub{
  color:var(--muted);
  margin-bottom:30px;
  font-size:14px;
}

.video-card{
  background:var(--dark2);
  border:1px solid var(--border);
  overflow:hidden;
}

.video-thumb{
  aspect-ratio:16/9;
  background:#151b25;
}

.video-thumb iframe{
  width:100%;
  height:100%;
}

.video-info{
  padding:18px;
}

.video-title{
  font-size:16px;
  margin-bottom:8px;
}

.video-desc{
  font-size:13px;
  color:var(--muted);
  line-height:1.6;
}

@media(max-width:600px){

  .members-title{
    font-size:30px;
  }

}
.video-preview{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
  display:block;
}

#videoGrid{
  display:flex;
  flex-direction:column;
  gap:80px;
}

</style>
</head>
<body>

<div class="login-screen" id="loginScreen">

  <div class="login-box">

    <div class="logo">PRO FX</div>

    <div class="sub">
      メンバー専用ページ
    </div>


    <input type="password" id="password" placeholder="パスワードを入力"> 
<button onclick="login()">ログイン</button>

<script>
const passwordInput = document.getElementById('password');

passwordInput.addEventListener('keydown', function(e) {

  if (e.key === 'Enter') {

    login();

  }

});
</script>

    <div class="error" id="error"></div>

  </div>

</div>

<div class="members-area" id="membersArea">

  <div class="members-header">

    <div class="members-title" id="planTitle">
      MEMBERS
    </div>

    <div class="members-sub" id="planSub">
      動画コンテンツ
    </div>

  </div>

  <div class="video-grid" id="videoGrid"></div>

</div>

<script>
    function loadVideo(element){

  const videoId =
    element.dataset.video;

  element.outerHTML = `

    <iframe
      src="https://www.youtube.com/embed/${videoId}?autoplay=1"
      frameborder="0"
      allowfullscreen
    ></iframe>

  `;

}

const STARTER_PASSWORD = "starter123";
const STANDARD_PASSWORD = "standard123";
const PREMIUM_PASSWORD = "premium123";

function createVideos(plan){

  const grid =
    document.getElementById("videoGrid");

  grid.innerHTML = "";

  // 共通HTML生成
  function createVideoCard(title){

    return `

      <div class="video-card">

        <div class="video-thumb">

          <img
            src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg"
            class="video-preview"
            onclick="loadVideo(this)"
            data-video="dQw4w9WgXcQ"
          >

        </div>

        <div class="video-info">

          <div class="video-title">
            ${title}
          </div>

          <div class="video-desc">
            PRO FX
          </div>

        </div>

      </div>

    `;

  }

  // 初心者講座
  let beginnerVideos = "";

  for(let i = 1; i <= 30; i++){

    beginnerVideos +=
      createVideoCard(`初心者講座 ${i}`);

  }

  // 手法解説
  let strategyVideos = "";

  const strategyCount =
    plan === "starter" ? 0 : 70;

  for(let i = 1; i <= strategyCount; i++){

    strategyVideos +=
      createVideoCard(`手法解説 ${i}`);

  }

  grid.innerHTML = `

    <div class="video-category">

      <div class="category-title">
        初心者基礎講座
      </div>

      <div class="category-sub">
        FXの基礎や専門用語を解説
      </div>

      <div class="video-grid">
        ${beginnerVideos}
      </div>

    </div>

    <div class="video-category">

      <div class="category-title">
        手法解説
      </div>

      <div class="category-sub">
        実践的なエントリー戦略
      </div>

      <div class="video-grid">
        ${strategyVideos}
      </div>

    </div>

  `;

}

function login(){

  const password =
    document.getElementById("password").value;

  const error =
    document.getElementById("error");

  error.textContent = "";

  if(password === STARTER_PASSWORD){

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("membersArea").style.display = "block";

    document.getElementById("planTitle").textContent =
      "STARTER PLAN";

    createVideos("starter");

  }

  else if(
    password === STANDARD_PASSWORD ||
    password === PREMIUM_PASSWORD
  ){

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("membersArea").style.display = "block";

    document.getElementById("planTitle").textContent =
      "STANDARD : PREMIUM MEMBERS";

    createVideos("premium");

  }

  else{

    error.textContent =
      "パスワードが違います";

  }

}

</script>

</body>
</html>
